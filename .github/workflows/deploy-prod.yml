name: Frontend AWS CI/CD Pipeline

on:
  push: 
    branches: 
      - prod


jobs:
  mandal-fronend: 
    runs-on: ubuntu-latest
    defaults: 
      run: 
        working-directory: frontend

    steps: 
      - name: Checkout-code
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with: 
          node-version: '20'

      - name: Notify Google Chat - Started
        run: |
          curl -X POST "${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d '{
            "text": "🚀 *Frontend Deploy Started*\n Branch: `prod`\n Triggered by: ${{ github.actor }}\n Commit: ${{ github.event.head_commit.message }}"
          }'

      - name: Install dependencies
        run: npm install 

      - name: Build the project
        run: npm run build --if-present 

      - name: Configure AWS CLI
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }} 

      - name: Deploy to S3 Bucket
        run: aws s3 sync ./dist/ s3://${{ secrets.AWS_S3_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront Cache
        uses: chetan/invalidate-cloudfront-action@v1
        with: 
          distribution-id: ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }}
          paths: '/*'
          aws-region: ${{ vars.AWS_REGION }}

      - name: Notify Google Chat - Success
        if: success()
        run: |
          curl -X POST "${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d '{
            "text": "✅ *Frontend Deploy Successful!*\n Branch: `prod`\n Triggered by: ${{ github.actor }}\n Commit: ${{ github.event.head_commit.message }}"
          }'
      
      - name: Notify Google Chat - Failed
        if: failure()
        run: |
          curl -X POST "${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d '{
            "text": "❌ *Frontend Deploy Failed!*\n Branch: `prod`\n Triggered by: ${{ github.actor }}\n Commit: ${{ github.event.head_commit.message }}"
          }'

  