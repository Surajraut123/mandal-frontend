name: Frontend CI/CD Pipeline

on: 
  push: 
    branch: 
      - main

jobs: 
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults: 
      run: 
        working-directory: frontend

    steps: 
      - name: Checkout-code
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with: 
          node-version: '20'

      - name: Notify Google Chat - Started
        run: |
          curl -X POST "${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d '{
            "text": "🚀 *Frontend Deploy Started*\n Branch: `main`\n Triggered by: ${{ github.actor }}\n Commit: ${{ github.event.head_commit.message }}"
          }'

      - name: Install dependencies
        run: npm install 

      - name: Build the project
        run: npm run build --if-present

      - name: Deploy to Render
        run : |
            curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Notify Google Chat - Success
        if: success()
        run: |
          curl -X POST "${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d '{
            "text": "✅ *Frontend Deploy Successful!*\n Branch: `main`\n Triggered by: ${{ github.actor }}\n Commit: ${{ github.event.head_commit.message }}"
          }'
      
      - name: Notify Google Chat - Failed
        if: failure()
        run: |
          curl -X POST "${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d '{
            "text": "❌ *Frontend Deploy Failed!*\n Branch: `main`\n Triggered by: ${{ github.actor }}\n Commit: ${{ github.event.head_commit.message }}"
          }'
